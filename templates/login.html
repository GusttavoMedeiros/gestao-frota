{% extends "base_auth.html" %}
{% block title %}Entrar — Gestão de Frota{% endblock %}
{% block content %}
<h1 class="auth-title">Entrar</h1>
<p class="auth-subtitle">Acesse com seu usuário e senha.</p>

<form method="post" class="auth-form">
  <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
  <div>
    <label class="form-label">Usuário</label>
    <input type="text" name="usuario" class="form-control" value="{{ usuario or '' }}" autofocus required autocomplete="username">
  </div>
  <div>
    <label class="form-label">Senha</label>
    <input type="password" name="senha" class="form-control" required autocomplete="current-password">
  </div>
  <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-1"></i>Entrar</button>
</form>
{% endblock %}
