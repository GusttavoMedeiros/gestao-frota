{% extends "base_auth.html" %}
{% block title %}Primeiro acesso — Gestão de Frota{% endblock %}
{% block content %}
<h1 class="auth-title">Primeiro acesso</h1>
<p class="auth-subtitle">Crie a conta de administrador do sistema. Esta tela só aparece uma vez.</p>

<form method="post" class="auth-form">
  <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
  <div>
    <label class="form-label">Seu nome</label>
    <input type="text" name="nome" class="form-control" placeholder="Opcional" maxlength="100">
  </div>
  <div>
    <label class="form-label">Usuário <span class="req">*</span></label>
    <input type="text" name="usuario" class="form-control" required maxlength="50" autocomplete="username" placeholder="ex.: gustavo">
  </div>
  <div>
    <label class="form-label">Senha <span class="req">*</span></label>
    <input type="password" name="senha" class="form-control" required minlength="6" autocomplete="new-password">
    <div class="form-hint">Pelo menos 6 caracteres.</div>
  </div>
  <div>
    <label class="form-label">Confirmar senha <span class="req">*</span></label>
    <input type="password" name="confirmar" class="form-control" required autocomplete="new-password">
  </div>
  <button type="submit" class="btn btn-primary w-100"><i class="bi bi-check-lg me-1"></i>Criar conta e entrar</button>
</form>
{% endblock %}
