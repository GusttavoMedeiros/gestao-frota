{% extends "base.html" %}
{% block title %}Novo Abastecimento{% endblock %}
{% block content %}
<h1 class="mb-4">Novo Abastecimento</h1>
<form method="post" class="bg-white p-4 shadow-sm rounded" style="max-width: 500px;">
  <div class="mb-3">
    <label class="form-label">Veículo</label>
    <select name="veiculo_id" class="form-select" required>
      <option value="" disabled selected>Selecione...</option>
      {% for v in veiculos %}
      <option value="{{ v.id }}">{{ v.placa }} - {{ v.marca }} {{ v.modelo }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Motorista (opcional)</label>
    <select name="motorista_id" class="form-select">
      <option value="">Não informado</option>
      {% for m in motoristas %}
      <option value="{{ m.id }}">{{ m.nome }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Data</label>
    <input type="date" name="data" class="form-control" value="{{ today }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Tipo de combustível</label>
    <select name="tipo_combustivel" class="form-select" required>
      <option value="gasolina">Gasolina</option>
      <option value="etanol">Etanol</option>
      <option value="diesel">Diesel</option>
      <option value="gnv">GNV</option>
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Litros</label>
    <input type="number" step="0.01" name="litros" class="form-control" min="0" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Valor total (R$)</label>
    <input type="number" step="0.01" name="valor_total" class="form-control" min="0" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Quilometragem do veículo na data</label>
    <input type="number" name="quilometragem" class="form-control" min="0" required>
  </div>
  <button type="submit" class="btn btn-primary">Salvar</button>
  <a href="{{ url_for('listar_abastecimentos') }}" class="btn btn-link">Cancelar</a>
</form>
{% endblock %}
