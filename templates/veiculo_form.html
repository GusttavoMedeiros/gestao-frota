{% extends "base.html" %}
{% block title %}{{ "Editar" if veiculo else "Novo" }} Veículo{% endblock %}
{% block content %}
<h1 class="mb-4">{{ "Editar" if veiculo else "Novo" }} Veículo</h1>
<form method="post" class="bg-white p-4 shadow-sm rounded" style="max-width: 500px;">
  <div class="mb-3">
    <label class="form-label">Placa</label>
    <input type="text" name="placa" class="form-control" value="{{ veiculo.placa if veiculo else '' }}" required maxlength="10">
  </div>
  <div class="mb-3">
    <label class="form-label">Marca</label>
    <input type="text" name="marca" class="form-control" value="{{ veiculo.marca if veiculo else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Modelo</label>
    <input type="text" name="modelo" class="form-control" value="{{ veiculo.modelo if veiculo else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Ano</label>
    <input type="number" name="ano" class="form-control" value="{{ veiculo.ano if veiculo else '' }}" required min="1950" max="2100">
  </div>
  <div class="mb-3">
    <label class="form-label">Quilometragem atual</label>
    <input type="number" name="quilometragem" class="form-control" value="{{ veiculo.quilometragem if veiculo else 0 }}" required min="0">
  </div>
  <div class="mb-3">
    <label class="form-label">Status</label>
    <select name="status" class="form-select">
      <option value="ativo" {% if veiculo and veiculo.status == 'ativo' %}selected{% endif %}>Ativo</option>
      <option value="manutencao" {% if veiculo and veiculo.status == 'manutencao' %}selected{% endif %}>Manutenção</option>
      <option value="inativo" {% if veiculo and veiculo.status == 'inativo' %}selected{% endif %}>Inativo</option>
    </select>
  </div>
  <button type="submit" class="btn btn-primary">Salvar</button>
  <a href="{{ url_for('listar_veiculos') }}" class="btn btn-link">Cancelar</a>
</form>
{% endblock %}
